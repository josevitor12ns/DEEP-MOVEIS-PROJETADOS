<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Móveis Projetados</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <h1>DEEP</h1>

    <nav id="menu">
        <a href="#home">Início</a>
        <a href="#sobre">Sobre</a>
        <a href="#servicos">Serviços</a>
        <a href="#avaliacoes">Avaliações</a>
        <a href="#contato">Contato</a>
    </nav>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<section id="home" class="banner fade">
    <h2>Design que transforma ambientes</h2>
    <p>Móveis planejados de alto padrão</p>
    <button onclick="whatsapp()">Solicitar Orçamento</button>
</section>

<section id="sobre" class="fade">
    <h2>Sobre</h2>
    <p>Projetos exclusivos com acabamento premium.</p>
</section>

<section id="servicos" class="fade">
    <h2>Serviços</h2>
    <div class="cards">
        <div class="card">Cozinhas</div>
        <div class="card">Guarda-Roupas</div>
        <div class="card">Painéis</div>
    </div>
</section>

<!-- ⭐ AVALIAÇÕES -->
<section id="avaliacoes" class="fade">
    <h2>Avaliações dos Clientes</h2>

    <div class="avaliacao-box">
        <div class="estrelas">
            <span onclick="setStar(1)">★</span>
            <span onclick="setStar(2)">★</span>
            <span onclick="setStar(3)">★</span>
            <span onclick="setStar(4)">★</span>
            <span onclick="setStar(5)">★</span>
        </div>

        <textarea id="comentario" placeholder="Deixe seu comentário..."></textarea>
        <button onclick="enviarAvaliacao()">Enviar Avaliação</button>
    </div>

    <div id="lista-avaliacoes"></div>
</section>

<section id="contato" class="fade">
    <h2>Contato</h2>
    <button onclick="whatsapp()">Falar no WhatsApp</button>
</section>

<footer>
    <p>© 2026 Deep</p>
</footer>

<!-- BOTÕES FLUTUANTES -->
<a href="https://www.instagram.com/deepmoveis" target="_blank" class="insta-float">
    <i class="fab fa-instagram"></i>
</a>

<a href="https://wa.me/5583999999999" target="_blank" class="whats-float">
    <i class="fab fa-whatsapp"></i>
</a>

<script src="script.js"></script>
</body>
</html>
