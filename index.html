<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Descubra Agora</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#000,#111);
color:white;
text-align:center;
padding:40px;
}

.box{
max-width:600px;
margin:auto;
background:#111;
padding:30px;
border-radius:10px;
}

button{
background:#00ff88;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
border-radius:8px;
margin-top:20px;
}

.opcao{
display:block;
background:#222;
padding:15px;
margin:10px;
cursor:pointer;
border-radius:8px;
}

</style>
</head>

<body>

<div class="box" id="inicio">

<h1>Descubra a Melhor Forma de Ganhar Dinheiro Online</h1>

<p>Responda esse quiz rápido</p>

<button onclick="startQuiz()">Começar</button>

</div>


<div class="box" id="quiz" style="display:none">

<h2 id="pergunta"></h2>

<div id="opcoes"></div>

</div>


<div class="box" id="resultado" style="display:none">

<h1>Resultado</h1>

<p>Com base nas suas respostas, esse método é ideal para você.</p>

<a href="SEU LINK DA KIWIFY">
<button>ACESSAR AGORA</button>
</a>

</div>


<script>

const perguntas = [

{
pergunta:"Você quer ganhar dinheiro pela internet?",
opcoes:["Sim","Quero muito","Com certeza"]
},

{
pergunta:"Você prefere trabalhar com:",
opcoes:["Celular","Computador","Qualquer um"]
},

{
pergunta:"Você quer aprender rápido?",
opcoes:["Sim","Claro","Muito"]
}

]

let atual = 0

function startQuiz(){
document.getElementById("inicio").style.display="none"
document.getElementById("quiz").style.display="block"
mostrarPergunta()
}

function mostrarPergunta(){

let p = perguntas[atual]

document.getElementById("pergunta").innerText = p.pergunta

let opcoesHTML=""

p.opcoes.forEach(op=>{
opcoesHTML += `<div class="opcao" onclick="proxima()">${op}</div>`
})

document.getElementById("opcoes").innerHTML = opcoesHTML

}

function proxima(){

atual++

if(atual < perguntas.length){

mostrarPergunta()

}else{

document.getElementById("quiz").style.display="none"
document.getElementById("resultado").style.display="block"

}

}

</script>

</body>
</html>
